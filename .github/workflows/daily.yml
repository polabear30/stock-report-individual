name: 개별 종목 AI 리포트

# 06:30 KST = 21:30 UTC (전날). GitHub cron은 best-effort(정시 보장 X)라 정시를 피하고
# 7시 전에 여유있게 끝나도록 6:30 실행.
on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: individual-report
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 의존성 설치
        run: pip install -r requirements.txt
      - name: 리포트 생성 (실데이터 + AI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
        run: python generate.py --out _site/index.html --status-out status.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
