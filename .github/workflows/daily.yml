name: 개별 종목 AI 리포트

# 06:30 KST, 화~토만 (일·월 미실행). 금요일 미국장 마감 → 토요일 아침 반영.
# cron은 UTC라 21:30 UTC = KST 다음날 06:30 → UTC 월~금(1-5) = KST 화~토.
on:
  # 자동 스케줄은 GCP Cloud Scheduler로 이관됨(2026-06-26).
  # 중복 게시 방지를 위해 GitHub cron 비활성화. 비상 시 수동 실행:
  # Actions 탭 → "개별 종목 AI 리포트" → Run workflow.
  # schedule:
  #   - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # 수동 실행 버튼 (비상용 백업)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: individual-report
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 의존성 설치
        run: pip install -r requirements.txt
      - name: 리포트 생성 (실데이터 + AI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
        run: python generate.py --out _site/index.html --status-out status.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
